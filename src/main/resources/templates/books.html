<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

  <head>
    <title>書籍一覧</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="/css/output.css" th:href="@{/css/output.css}">
  </head>
  <body class="min-h-screen bg-slate-100 px-4 py-10 text-slate-800">
    <div class="mx-auto max-w-5xl">
      <div class="mb-6 flex items-center justify-between gap-4">
        <div>
          <p class="text-sm font-semibold tracking-[0.3em] text-slate-500">BOOK MANAGER WEB</p>
          <h1 class="mt-2 text-3xl font-bold text-slate-900">書籍一覧</h1>
          <p class="mt-2 text-sm text-slate-500">登録済みの書籍をまとめて確認できます。</p>
        </div>
        <a
          th:href="@{/register-form}"
          class="inline-flex items-center rounded-lg bg-slate-700 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-600"
        >
          書 籍 登 録
        </a>
      </div>

      <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg shadow-slate-200/70">
        <div class="border-b border-slate-200 bg-slate-50 px-6 py-4">
          <h2 class="text-lg font-semibold text-slate-800">登録データ</h2>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-800 text-left text-sm font-semibold text-slate-100">
              <tr>
                <th class="px-6 py-4">ID</th>
                <th class="px-6 py-4">タイトル</th>
                <th class="px-6 py-4">購入日</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 bg-white">
              <tr
                th:each="book : ${books}"
                class="transition hover:bg-slate-50"
              >
                <td class="px-6 py-4 text-sm font-medium text-slate-500" th:text="${book.id}"></td>
                <td class="px-6 py-4 text-base font-semibold text-slate-800" th:text="${book.title}"></td>
                <td class="px-6 py-4 text-sm text-slate-600" th:text="${book.purchaseDate}"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="mt-8 text-center">
        <a
          th:href="@{/}"
          class="text-sm font-semibold text-slate-600 transition hover:text-slate-900"
        >
          メニューに戻る
        </a>
      </div>
    </div>
  </body>
</html>
