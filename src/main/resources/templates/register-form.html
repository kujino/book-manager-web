<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

  <head>
    <title>書籍登録</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="/css/output.css" th:href="@{/css/output.css}">
  </head>

  <body class="min-h-screen bg-slate-100 px-4 py-10 text-slate-800">
    <div class="mx-auto max-w-3xl">
      <div class="mb-8">
        <p class="text-sm font-semibold tracking-[0.3em] text-slate-500">BOOK MANAGER WEB</p>
        <h1 class="mt-2 text-3xl font-bold text-slate-900">書籍登録</h1>
        <p class="mt-2 text-sm text-slate-500">タイトルと購入日を入力して、登録内容を確認します。</p>
      </div>

      <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg shadow-slate-200/70">
        <div class="border-b border-slate-200 bg-slate-50 px-6 py-4">
          <h2 class="text-lg font-semibold text-slate-800">入力フォーム</h2>
        </div>

        <form th:action="@{/register-form}" th:object="${bookForm}" method="POST" class="space-y-6 px-6 py-8 sm:px-8">
          <div class="space-y-2">
            <label for="title" class="block text-sm font-semibold text-slate-700">書籍タイトル</label>
            <input
              id="title"
              type="text"
              th:field="*{title}"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-base text-slate-800 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-4 focus:ring-slate-200"
              placeholder="タイトルを入力してください"
            >
            <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-sm font-medium text-rose-500"></p>
          </div>

          <div class="space-y-2">
            <label for="purchaseDate" class="block text-sm font-semibold text-slate-700">購入日</label>
            <input
              id="purchaseDate"
              type="date"
              th:field="*{purchaseDate}"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-base text-slate-800 shadow-sm outline-none transition focus:border-slate-500 focus:ring-4 focus:ring-slate-200"
            >
            <p th:if="${#fields.hasErrors('purchaseDate')}" th:errors="*{purchaseDate}" class="text-sm font-medium text-rose-500"></p>
          </div>

          <div class="flex flex-col gap-3 border-t border-slate-200 pt-6 sm:flex-row sm:items-center sm:justify-between">
            <a
              th:href="@{/}"
              class="inline-flex items-center justify-center rounded-lg border border-slate-300 px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-400 hover:text-slate-900"
            >
              メニューへ戻る
            </a>
            <button
              type="submit"
              class="inline-flex items-center justify-center rounded-lg bg-slate-700 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-600"
            >
              入力内容を確認
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>

</html>
